kind = "web"
previewPath = "/"
title = "SHADOWWEAVE"
version = "1.0.0"
id = "artifacts/shadowweave"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19647

[services.development]
run = "pnpm --filter @workspace/shadowweave run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shadowweave", "run", "build" ]
publicDir = "artifacts/shadowweave/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19647"
BASE_PATH = "/"
